    - data:
        code: "import re\nimport json\n\ndef main(slides_json: str) -> dict:\n   \
          \ try:\n        slides = json.loads(slides_json)\n        if not isinstance(slides,\
          \ list):\n            return {\"slides\": []}\n\n        safe_slides = []\n\
          \        for s in slides:\n            if not isinstance(s, dict):\n   \
          \             continue\n\n            layout        = s.get(\"layout\",\
          \ \"text\")\n            content_points = s.get(\"content_points\", [])\
          \ or []\n            left_points    = s.get(\"left_points\", []) or []\n\
          \            right_points   = s.get(\"right_points\", []) or []\n      \
          \      table_header   = s.get(\"table_header\", []) or []\n            table_rows\
          \     = s.get(\"table_rows\", []) or []\n            formulas       = s.get(\"\
          formulas\", []) or []\n            image          = s.get(\"selected_image\"\
          ) or {}\n            key_stat = str(s.get(\"key_stat\", \"\") or \"\").strip()\n\
          \            details  = str(s.get(\"details\", \"\") or \"\").strip()\n\n\
          \            # 主体内容渲染\n            body = \"\"\n            if layout ==\
          \ \"table\" and table_header:\n                body += \"| \" + \" | \"\
          .join(str(h) for h in table_header) + \" |\\n\"\n                body +=\
          \ \"|\" + \" :---: |\" * len(table_header) + \"\\n\"\n                for\
          \ row in table_rows:\n                    body += \"| \" + \" | \".join(str(c)\
          \ for c in row) + \" |\\n\"\n            elif layout == \"two_col\" and\
          \ left_points:\n                body += \"| 核心概念 | 关键说明 |\\n|---------|----------|\\\
          n\"\n                for i in range(len(left_points)):\n               \
          \     right = right_points[i] if i < len(right_points) else \"\"\n     \
          \               body += f\"| **{left_points[i]}** | {right} |\\n\"\n   \
          \         elif layout == \"data_highlight\" and content_points:\n      \
          \          for point in content_points:\n                    body += f\"\
          - ### {point}\\n\"\n            elif layout == \"method_flow\" and content_points:\n\
          \                for idx, point in enumerate(content_points, 1):\n     \
          \               body += f\"{idx}. **{point}**\\n\"\n            else:\n\
          \                for point in content_points:\n                    body\
          \ += f\"- **{point}**\\n\"\n\n            # 公式渲染 — 兼容两种格式：\n           \
          \ #   dict 格式: {\"latex\": \"$$...$$\", \"description\": \"说明\"}\n     \
          \       #   string 格式: \"$$...$$\"\n            formula_str = \"\"\n   \
          \         for item in formulas:\n                if isinstance(item, dict):\n\
          \                    latex = str(item.get(\"latex\", \"\") or \"\")\n  \
          \                  desc  = str(item.get(\"description\", \"\") or \"\")\n\
          \                elif isinstance(item, str):\n                    latex\
          \ = item\n                    desc  = \"\"\n                else:\n    \
          \                continue\n                if latex.strip():\n         \
          \           formula_str += latex.strip() + \"\\n\"\n                   \
          \ if desc.strip():\n                        formula_str += f\"*{desc.strip()}*\\\
          n\"\n\n            # 图片处理\n            image_url = str(image.get(\"url\"\
          , \"\") or \"\")\n            if image_url in (\"null\", \"None\", \"\"\
          ):\n                image_url = \"\"\n            raw_caption = str(image.get(\"\
          caption\", \"\") or \"\")\n            m = re.search(r'[Ff]ig(?:ure)?\\\
          .?\\s*\\d+|图\\s*\\d+', raw_caption)\n            image_caption = m.group(0)\
          \ if m else \"\"\n\n            clean = lambda x: x if x not in (\"null\"\
          , \"None\") else \"\"\n            safe_slides.append({\n              \
          \  \"slide_number\": s.get(\"slide_number\", 0),\n                \"title\"\
          : str(s.get(\"title\", \"\")),\n                \"layout\": layout,\n  \
          \              \"body\": body,\n                \"formula_str\": formula_str,\n\
          \                \"key_stat\": clean(key_stat),\n                \"details\"\
          : clean(details),\n                \"image_url\": image_url,\n         \
          \       \"image_caption\": image_caption,\n            })\n\n        return\
          \ {\"slides\": safe_slides}\n    except Exception:\n        return {\"slides\"\
          : []}\n"
