    - data:
        code: "import json\nimport re\n\ndef main(ocr_text: str, ocr_json: list, ppt_outline_text:\
          \ str) -> dict:\n    if not ocr_text or not isinstance(ocr_text, str):\n\
          \        return {\"result\": json.dumps({\"error\": \"ocr_text empty\",\
          \ \"slide_contents\": [], \"total_slides\": 0}, ensure_ascii=False)}\n \
          \   if not ppt_outline_text:\n        return {\"result\": json.dumps({\"\
          error\": \"outline empty\", \"slide_contents\": [], \"total_slides\": 0},\
          \ ensure_ascii=False)}\n\n    # 解析大纲\n    outline_text = ppt_outline_text.strip()\n\
          \    ppt_outline_obj = None\n    for text in [outline_text, re.sub(r'^```json\\\
          s*|\\s*```$', '', outline_text, flags=re.DOTALL)]:\n        try:\n     \
          \       ppt_outline_obj = json.loads(text)\n            break\n        except\
          \ Exception:\n            pass\n    if not ppt_outline_obj:\n        return\
          \ {\"result\": json.dumps({\"error\": \"Failed to parse outline\", \"slide_contents\"\
          : [], \"total_slides\": 0}, ensure_ascii=False)}\n\n    ppt_slides = ppt_outline_obj.get(\"\
          ppt_outline\", [])\n    if not ppt_slides:\n        return {\"result\":\
          \ json.dumps({\"error\": \"No ppt_outline\", \"slide_contents\": [], \"\
          total_slides\": 0}, ensure_ascii=False)}\n\n    # 提取全部图片\n    all_images\
          \ = extract_all_images(ocr_json or [])\n\n    # ── 核心修复：图片预分配，每张图只分配给一张幻灯片\
          \ ──────────\n    image_assignment = assign_images_uniquely(ppt_slides,\
          \ all_images)\n\n    result = {\n        \"slide_contents\": [],\n     \
          \   \"total_slides\": len(ppt_slides),\n        \"extraction_summary\":\
          \ {\"total_images_found\": len(all_images), \"slides_with_content\": 0}\n\
          \    }\n\n    for slide in ppt_slides:\n        sn = slide.get(\"slide_number\"\
          )\n        content_source = slide.get(\"content_source\", \"\")\n      \
          \  title = slide.get(\"title\", \"\")\n        extracted_text = extract_chapter_text(ocr_text,\
          \ content_source, title)\n        assigned_img = image_assignment.get(sn)\
          \  # None 或单张图片\n        extracted_images = [assigned_img] if assigned_img\
          \ else []\n\n        slide_content = {\n            \"slide_number\": sn,\n\
          \            \"title\": title,\n            \"content_source\": content_source,\n\
          \            \"expected_figure_type\": slide.get(\"expected_figure_type\"\
          ),\n            \"extracted_text\": extracted_text,\n            \"extracted_images\"\
          : extracted_images,\n            \"text_length\": len(extracted_text),\n\
          \            \"image_count\": len(extracted_images)\n        }\n       \
          \ result[\"slide_contents\"].append(slide_content)\n        if extracted_text\
          \ or extracted_images:\n            result[\"extraction_summary\"][\"slides_with_content\"\
          ] += 1\n\n    return {\"result\": json.dumps(result, ensure_ascii=False,\
          \ indent=2)}\n\n\n# ── 图片提取 ──────────────────────────────────────────────────\n\
          def extract_all_images(ocr_json: list) -> list:\n    images, seen = [],\
          \ set()\n    for item in ocr_json:\n        if not isinstance(item, dict):\n\
          \            continue\n        for layout_item in item.get(\"result\", {}).get(\"\
          layoutParsingResults\", []):\n            page = layout_item.get(\"page\"\
          , 0)\n            md = layout_item.get(\"markdown\", {})\n            page_text\
          \ = md.get(\"text\", \"\")\n            for fname, url in md.get(\"images\"\
          , {}).items():\n                if fname not in seen:\n                \
          \    seen.add(fname)\n                    images.append({\"filename\": fname,\
          \ \"url\": url, \"caption\": extract_figure_caption(page_text), \"page\"\
          : page})\n    return images\n\n\ndef extract_figure_caption(text: str) ->\
          \ str:\n    for pat in [\n        r'[Ff]igure\\s+\\d+[:\\.]?\\s*[A-Z][^\\\
          n]{5,80}',\n        r'[Ff]ig\\.\\s*\\d+[:\\.]?\\s*[A-Z][^\\n]{5,60}',\n\
          \        r'图\\s*\\d+[\\s:\\-]\\s*[^\\n]{5,40}',\n    ]:\n        m = re.search(pat,\
          \ text)\n        if m:\n            return m.group(0).strip()[:80]\n   \
          \ return \"\"\n\n\n# ── 图片唯一分配 ─────────────────────────────────────────────\n\
          def assign_images_uniquely(ppt_slides: list, all_images: list) -> dict:\n\
          \    \"\"\"\n    每张图只分配给一张幻灯片：\n    - 按页码排序图片\n    - 按幻灯片顺序，有 expected_figure_type\
          \ 的优先获得图片\n    - 一旦分配出去，同一张图不再重复\n    \"\"\"\n    images_sorted = sorted(all_images,\
          \ key=lambda x: x.get('page', 0))\n    slides_need_img = [s for s in ppt_slides\
          \ if s.get('expected_figure_type')]\n    assignment = {}\n    for i, slide\
          \ in enumerate(slides_need_img):\n        if i < len(images_sorted):\n \
          \           assignment[slide['slide_number']] = images_sorted[i]\n    return\
          \ assignment\n\n\n# ── 文本提取（支持中英文，带标题关键词兜底）─────────────────────\ndef extract_chapter_text(ocr_text:\
          \ str, content_source: str, title: str = \"\") -> str:\n    cs = (content_source\
          \ or \"\").strip()\n    if not cs or cs in (\"null\", \"None\"):\n     \
          \   return \"\"\n\n    # 摘要/Abstract\n    if any(k in cs for k in [\"摘要\"\
          , \"Abstract\", \"abstract\"]):\n        return _extract_abstract(ocr_text)\n\
          \n    # 1. 优先按章节数字提取（英文 \"3\", \"3.1\" 等）\n    en_match = re.search(r'\\\
          b(\\d+(?:\\.\\d+)*)\\b', cs)\n    if en_match:\n        text = _extract_by_section_number(ocr_text,\
          \ en_match.group(1))\n        if text:\n            return text\n\n    #\
          \ 2. 中文\"第X章\"\n    zh_match = re.search(r'第(\\d+)章', cs)\n    if zh_match:\n\
          \        text = _extract_by_chinese_chapter(ocr_text, zh_match.group(1))\n\
          \        if text:\n            return text\n\n    # 3. 用幻灯片标题关键词兜底（对空白页效果显著）\n\
          \    keywords_to_try = []\n    # 英文关键词映射\n    title_kw_map = {\n       \
          \ \"背景\": [\"Introduction\", \"Background\", \"Related\"],\n        \"目标\"\
          : [\"challenge\", \"problem\", \"CH1\", \"CH2\"],\n        \"方法\": [\"Methodology\"\
          , \"Method\", \"RSTC\", \"SAOT\"],\n        \"实验\": [\"Experiment\", \"\
          Evaluation\", \"dataset\"],\n        \"结果\": [\"Result\", \"Performance\"\
          , \"ACC\", \"NMI\"],\n        \"消融\": [\"Ablation\", \"variant\"],\n   \
          \     \"创新\": [\"contribution\", \"propose\", \"novel\"],\n        \"不足\"\
          : [\"Limitation\", \"limitation\", \"future\"],\n        \"展望\": [\"future\"\
          , \"conclusion\", \"Conclusion\"],\n    }\n    for kw_zh, kw_en_list in\
          \ title_kw_map.items():\n        if kw_zh in title:\n            keywords_to_try.extend(kw_en_list)\n\
          \n    for kw in keywords_to_try:\n        idx = ocr_text.find(kw)\n    \
          \    if idx >= 0:\n            start = max(0, idx - 100)\n            return\
          \ ocr_text[start: idx + 2500].strip()[:3000]\n\n    # 4. 最终兜底：从摘要返回\n  \
          \  return _extract_abstract(ocr_text)[:1500]\n\n\ndef _extract_by_section_number(text:\
          \ str, section_num: str) -> str:\n    depth = len(section_num.split('.'))\n\
          \    candidates = [\n        rf'(?:^|\\n)#{{{min(depth+1,4)}}}\\s+{re.escape(section_num)}[\\\
          s\\.\\:]',\n        rf'(?:^|\\n)##\\s+{re.escape(section_num)}\\s',\n  \
          \      rf'(?:^|\\n){re.escape(section_num)}\\s+[A-Z\\u4e00-\\u9fff]',\n\
          \    ]\n    start_match = None\n    for pat in candidates:\n        start_match\
          \ = re.search(pat, text, re.MULTILINE)\n        if start_match:\n      \
          \      break\n    if not start_match:\n        return \"\"\n    start_pos\
          \ = start_match.start()\n    parts = section_num.split('.')\n    next_num\
          \ = str(int(parts[-1]) + 1)\n    next_section = '.'.join(parts[:-1] + [next_num])\
          \ if len(parts) > 1 else next_num\n    end_pos = len(text)\n    for pat\
          \ in [rf'(?:^|\\n)#{{{min(depth+1,4)}}}\\s+{re.escape(next_section)}',\n\
          \                rf'(?:^|\\n)##\\s+{str(int(parts[0])+1)}[\\s\\.]']:\n \
          \       m = re.search(pat, text[start_pos + 5:], re.MULTILINE)\n       \
          \ if m:\n            end_pos = start_pos + 5 + m.start()\n            break\n\
          \    return text[start_pos:end_pos].strip()[:3500]\n\n\ndef _extract_by_chinese_chapter(text:\
          \ str, chapter_num: str) -> str:\n    m = re.search(rf'##\\s*第{chapter_num}章.*?\\\
          n', text)\n    if not m:\n        m = re.search(rf'第{chapter_num}章.*?\\\
          n', text)\n    if not m:\n        return \"\"\n    start_pos = m.start()\n\
          \    em = re.search(rf'##\\s*第{int(chapter_num)+1}章|##\\s*参考文献', text[start_pos\
          \ + 10:])\n    end_pos = start_pos + 10 + em.start() if em else len(text)\n\
          \    return text[start_pos:end_pos].strip()[:3500]\n\n\ndef _extract_abstract(text:\
          \ str) -> str:\n    for pat in [\n        r'##\\s*Abstract\\s*\\n+(.*?)(?=##\\\
          s*(?:Keywords?|Introduction|\\d+\\s+\\w))',\n        r'Abstract\\s*\\n+(.*?)(?=\\\
          n\\d+\\s+[A-Z])',\n        r'##\\s*摘要\\s*\\n+(.*?)(?=##)',\n    ]:\n   \
          \     m = re.search(pat, text, re.DOTALL | re.IGNORECASE)\n        if m:\n\
          \            return m.group(1).strip()[:2500]\n    return text[:2000].strip()\n"
        code_language: python3
