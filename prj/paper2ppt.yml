    - data:
        code: "\"\"\"\n代码节点：提取摘要和目录\n功能：从OCR纯文本中提取关键信息（摘要+目录）\n输入：ocr_result（String类型，OCR解析的纯文本）\n\
          输出：{chinese_abstract, english_abstract, table_of_contents, error}\n\"\"\"\
          \n\nimport re\n\ndef main(arg1):\n    \"\"\"\n    Dify代码节点入口函数\n    \n \
          \   参数:\n        arg1: OCR解析的纯文本字符串（直接传入）\n    \n    返回:\n        dict:\
          \ {\n            \"chinese_abstract\": \"中文摘要内容\",\n            \"english_abstract\"\
          : \"英文摘要内容\", \n            \"table_of_contents\": \"目录结构\",\n         \
          \   \"error\": \"错误信息（无错误时为空字符串）\"\n        }\n    \"\"\"\n    \n    # ==========\
          \ 辅助函数定义 ==========\n    \n    def extract_chinese_abstract(text):\n   \
          \     \"\"\"提取中文摘要\"\"\"\n        # 匹配 \"摘要\" 到 \"关键词\" 或 \"Abstract\" 之间的内容\n\
          \        pattern = r'##?\\s*摘\\s*要\\s*\\n+(.*?)(?=##?\\s*(?:关键词|Abstract|ABSTRACT|目录|第.*?章))'\n\
          \        match = re.search(pattern, text, re.DOTALL | re.IGNORECASE)\n \
          \       \n        if match:\n            abstract = match.group(1).strip()\n\
          \            # 清理多余空行\n            abstract = re.sub(r'\\n{3,}', '\\n\\\
          n', abstract)\n            return abstract\n        \n        return \"\"\
          \n    \n    \n    def extract_english_abstract(text):\n        \"\"\"提取英文摘要\"\
          \"\"\n        # 匹配 \"Abstract\" 到 \"Keywords\" 或 \"目录\" 之间的内容\n        pattern\
          \ = r'##?\\s*Abstract\\s*\\n+(.*?)(?=##?\\s*(?:Keywords|KEYWORDS|目录|第.*?章))'\n\
          \        match = re.search(pattern, text, re.DOTALL | re.IGNORECASE)\n \
          \       \n        if match:\n            abstract = match.group(1).strip()\n\
          \            # 清理多余空行\n            abstract = re.sub(r'\\n{3,}', '\\n\\\
          n', abstract)\n            return abstract\n        \n        return \"\"\
          \n    \n    \n    def extract_table_of_contents(text):\n        \"\"\"提取目录结构\"\
          \"\"\n        toc_lines = []\n        \n        # 方法1: 查找 \"目录\" 或 \"CONTENTS\"\
          \ 标题后的内容\n        pattern = r'##?\\s*(?:目\\s*录|目录|CONTENTS|Contents|TABLE\
          \ OF CONTENTS)\\s*\\n+(.*?)(?=##?\\s*(?:第.*?章|Chapter|引言|绪论|Introduction))'\n\
          \        match = re.search(pattern, text, re.DOTALL | re.IGNORECASE)\n \
          \       \n        if match:\n            toc_content = match.group(1)\n\
          \            # 提取目录项（包含页码的行）\n            lines = toc_content.split('\\\
          n')\n            for line in lines:\n                line = line.strip()\n\
          \                # 匹配章节格式：第X章、1.、1.1、Chapter等，且包含页码\n                if\
          \ re.search(r'(第.*?章|^\\d+\\.|\\d+\\.\\d+|Chapter\\s+\\d+|Section\\s+\\\
          d+)', line):\n                    if line and len(line) > 3:  # 过滤太短的行\n\
          \                        toc_lines.append(line)\n        \n        # 方法2:\
          \ 如果没找到目录区域，尝试提取所有章节标题\n        if not toc_lines:\n            # 匹配 ## 标题格式\n\
          \            chapter_pattern = r'##\\s+(第.*?章.*?|Chapter\\s+\\d+.*?|\\d+\\\
          ..*?)$'\n            for line in text.split('\\n'):\n                if\
          \ re.match(chapter_pattern, line.strip()):\n                    toc_lines.append(line.strip().replace('##',\
          \ '').strip())\n        \n        return '\\n'.join(toc_lines) if toc_lines\
          \ else \"\"\n    \n    \n    # ========== 主逻辑 ==========\n    \n    # 1.\
          \ 获取OCR文本（直接就是字符串）\n    try:\n        ocr_text = str(arg1)\n    except Exception\
          \ as e:\n        return {\n            \"chinese_abstract\": \"\",\n   \
          \         \"english_abstract\": \"\",\n            \"table_of_contents\"\
          : \"\",\n            \"error\": f\"输入参数错误: {str(e)}\"\n        }\n    \n\
          \    # 2. 提取摘要和目录\n    try:\n        chinese_abstract = extract_chinese_abstract(ocr_text)\n\
          \        english_abstract = extract_english_abstract(ocr_text)\n       \
          \ table_of_contents = extract_table_of_contents(ocr_text)\n        \n  \
          \      return {\n            \"chinese_abstract\": chinese_abstract,\n \
          \           \"english_abstract\": english_abstract,\n            \"table_of_contents\"\
          : table_of_contents,\n            \"error\": \"\"\n        }\n    except\
          \ Exception as e:\n        return {\n            \"chinese_abstract\": \"\
          \",\n            \"english_abstract\": \"\",\n            \"table_of_contents\"\
          : \"\",\n            \"error\": f\"提取失败: {str(e)}\"\n        }\n"
        code_language: python3
        outputs:
          chinese_abstract:
            children: null
            type: string
          english_abstract:
            children: null
            type: string
          error:
            children: null
            type: string
          table_of_contents:
            children: null
            type: string
