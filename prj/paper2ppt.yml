          \   用途：\n        将迭代变量解包为独立的字段，供LLM节点使用\n    \"\"\"\n    try:\n        #\
          \ 如果item是字符串，尝试解析为JSON\n        if isinstance(item, str):\n            item_obj\
          \ = json.loads(item)\n        else:\n            item_obj = item\n     \
          \   \n        # 提取所有字段\n        slide_number = item_obj.get(\"slide_number\"\
          , 0)\n        title = item_obj.get(\"title\", \"\")\n        content_source\
          \ = item_obj.get(\"content_source\", \"\")\n        expected_figure_type\
          \ = item_obj.get(\"expected_figure_type\", \"\")\n        extracted_text\
          \ = item_obj.get(\"extracted_text\", \"\")\n        extracted_images = item_obj.get(\"\
          extracted_images\", [])\n        text_length = item_obj.get(\"text_length\"\
          , 0)\n        image_count = item_obj.get(\"image_count\", 0)\n        \n\
          \        # 限制文本长度（避免超过LLM上下文限制）\n        if len(extracted_text) > 3000:\n\
          \            extracted_text = extracted_text[:3000] + \"...(已截断)\"\n   \
          \     \n        return {\n            \"slide_number\": slide_number,\n\
          \            \"title\": title,\n            \"content_source\": content_source,\n\
          \            \"expected_figure_type\": str(expected_figure_type) if expected_figure_type\
          \ else \"\",\n            \"extracted_text\": extracted_text,\n        \
          \    \"extracted_images\": json.dumps(extracted_images, ensure_ascii=False),\n\
          \            \"text_length\": text_length,\n            \"image_count\"\
          : image_count\n        }\n    \n    except json.JSONDecodeError as e:\n\
          \        # JSON解析失败\n        return {\n            \"slide_number\": 0,\n\
          \            \"title\": \"解析失败\",\n            \"content_source\": \"\"\
          ,\n            \"expected_figure_type\": \"\",\n            \"extracted_text\"\
