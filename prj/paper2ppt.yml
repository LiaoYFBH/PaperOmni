    - data:
        code: "\"\"\"\n代码节点：收集所有页面内容\n功能：整合迭代节点输出的所有页面数据\n输入：iteration_output（Array[String]，迭代节点的output数组）\n\
          输出：{slides_json, total_slides, error}\n\"\"\"\n\nimport json\n\ndef main(iteration_output):\n\
          \    try:\n        slides = []\n\n        if not iteration_output:\n   \
          \         return {\n                \"total_slides\": 0,\n             \
          \   \"slides_json\": \"[]\",\n                \"error\": \"\"\n        \
          \    }\n\n        if isinstance(iteration_output, dict):\n            iteration_output\
          \ = list(iteration_output.values())\n\n        if not isinstance(iteration_output,\
          \ (list, tuple)):\n            return {\n                \"total_slides\"\
          : 0,\n                \"slides_json\": \"[]\",\n                \"error\"\
          : f\"iteration_output类型异常: {type(iteration_output).__name__}\"\n       \
          \     }\n\n        for item in iteration_output:\n            if not item:\n\
          \                continue\n\n            if isinstance(item, dict):\n  \
          \              slides.append(item)\n                continue\n\n       \
          \     if isinstance(item, list):\n                for sub in item:\n   \
          \                 if isinstance(sub, dict):\n                        slides.append(sub)\n\
          \                    elif isinstance(sub, str) and sub.strip():\n      \
          \                  try:\n                            slide_data = json.loads(sub.strip())\n\
          \                            if isinstance(slide_data, dict):\n        \
          \                        slides.append(slide_data)\n                   \
          \     except json.JSONDecodeError:\n                            continue\n\
          \                continue\n\n            if not isinstance(item, str):\n\
          \                continue\n\n            cleaned_item = item.strip()\n \
          \           if cleaned_item.startswith('```json'):\n                cleaned_item\
          \ = cleaned_item[7:]\n            if cleaned_item.startswith('```'):\n \
          \               cleaned_item = cleaned_item[3:]\n            if cleaned_item.endswith('```'):\n\
          \                cleaned_item = cleaned_item[:-3]\n            cleaned_item\
          \ = cleaned_item.strip()\n\n            if not cleaned_item:\n         \
          \       continue\n\n            try:\n                slide_data = json.loads(cleaned_item)\n\
          \                if isinstance(slide_data, dict):\n                    slides.append(slide_data)\n\
          \                elif isinstance(slide_data, list):\n                  \
          \  for sub in slide_data:\n                        if isinstance(sub, dict):\n\
          \                            slides.append(sub)\n            except json.JSONDecodeError\
          \ as e:\n                print(f\"解析失败: {str(e)}, 内容: {cleaned_item[:100]}\"\
          )\n                continue\n\n        slides = [s for s in slides if isinstance(s,\
          \ dict)]\n        slides.sort(key=lambda x: x.get('slide_number', 0))\n\
          \        slides_json = json.dumps(slides, ensure_ascii=False, indent=2)\n\
          \n        return {\n            \"total_slides\": len(slides),\n       \
          \     \"slides_json\": slides_json,\n            \"error\": \"\"\n     \
          \   }\n\n    except Exception as e:\n        return {\n            \"total_slides\"\
          : 0,\n            \"slides_json\": \"[]\",\n            \"error\": f\"收集页面内容失败:\
          \ {str(e)}\"\n        }\n"
        code_language: python3
