    - data:
        code: "import json\n\ndef main(item: str) -> dict:\n    \"\"\"\n    在迭代节点内解包当前项，提取所有字段\n\
          \    \n    输入：\n        item: 迭代节点的当前项（可能是JSON字符串或对象）\n    \n    输出：\n \
