          \ the original PDF before citing or conducting in-depth research.\r\nDate:\
          \ {{ items.target_date | default('Today') }}\r\n==================================================\r\
          \n\r\n{# Automatically adapt data structure #}\r\n{% set final_list = items.paper\
          \ | default(items) %}\r\n\r\n{% for item in final_list %}\r\n\U0001F4C4\
          \ [{{ loop.index }}] {{ item.title }}\r\n--------------------------------------------------\r\
          \n\U0001F464 Authors: {{ item.authors }}\r\n\U0001F3E2 Affiliation: {{ item.affiliation\
          \ }}\r\n\U0001F517 PDF: {{ item.pdf_url }}\r\n\U0001F4C5 Status: {{ item.published\
          \ }}\r\n{% if item.code_url and item.code_url != 'N/A' %}\r\n\U0001F4E6\
          \ Code: {{ item.github_stats }}\r\n   \U0001F517 {{ item.code_url }}\r\n\
          {% else %}\r\n\U0001F4E6 Code: {{ item.github_stats }}\r\n{% endif %}\r\n\
          Abstract:\r\n{{ item.summary | replace('\\n', ' ') }}\r\n\r\n\U0001F680\
          \ Core Innovation:\r\n{{ item.ai_evaluation.One_Liner }}\r\n\r\n\U0001F4CA\
