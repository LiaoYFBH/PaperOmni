    - data:
        code: "import json\nimport re\n\ndef main(title: str, url: str, summary: str,\
          \ llm_string: str, pub_date: str, comment: str, authors: str) -> dict:\n\
          \    pub_status = \"Preprint\"\n    comment = comment if comment else \"\
          N/A\"\n    \n    if comment != \"N/A\":\n        conf_keywords = ['cvpr',\
          \ 'iccv', 'eccv', 'nips', 'neurips', 'iclr', 'aaai', 'ijcai', 'acl', 'emnlp',\
          \ 'naacl', 'siggraph', 'kdd', 'icml']\n        lower_comment = comment.lower()\n\
          \        \n        for kw in conf_keywords:\n            if kw in lower_comment:\n\
          \                display_comment = comment[:25] + \"...\" if len(comment)\
          \ > 25 else comment\n                pub_status = f\"\U0001F389 {kw.upper()}\
          \ ({display_comment})\"\n                break\n        else:\n        \
          \    if 'conf' in lower_comment or 'proc' in lower_comment:\n          \
          \      pub_status = \"\U0001F4C5 Conference/Journal\"\n            elif\
          \ 'workshop' in lower_comment:\n                pub_status = \"\U0001F6E0\
          ️ Workshop\"\n    \n    try:\n        clean_date = pub_date[:10]\n    except:\n\
          \        clean_date = \"Recent\"\n\n    full_status_line = f\"{clean_date}\
          \ | {pub_status}\"\n\n    ai_data = {\n        \"One_Liner\": \"AI is reading...\"\
          ,\n        \"Architecture\": \"Integrated architecture\",\n        \"Dataset\"\
          : \"Relevant data\",\n        \"Metrics\": \"Core metrics\",\n        \"\
          Affiliation\": \"Extracting...\",\n        \"Code_Url\": \"N/A\"\n    }\n\
          \n    try:\n        if llm_string:\n            clean_content = llm_string.strip()\n\
          \            \n            code_block_match = re.search(\n             \
          \   r'```(?:json)?\\s*(\\{.*?\\})\\s*```',\n                clean_content,\n\
          \                re.DOTALL\n            )\n            if code_block_match:\n\
          \                clean_json = code_block_match.group(1)\n            else:\n\
          \                match = re.search(r'\\{.*\\}', clean_content, re.DOTALL)\n\
          \                clean_json = match.group() if match else clean_content\n\
          \            \n            clean_json = clean_json.strip()\n           \
          \ \n            try:\n                parsed_data = json.loads(clean_json,\
          \ strict=False)\n            except json.JSONDecodeError:\n            \
          \    clean_json = clean_json.replace(\"'\", '\"')\n                clean_json\
          \ = re.sub(r',\\s*}', '}', clean_json)\n                clean_json = re.sub(r',\\\
          s*]', ']', clean_json)\n                try:\n                    parsed_data\
          \ = json.loads(clean_json, strict=False)\n                except:\n    \
          \                parsed_data = None\n            \n            if parsed_data\
          \ and isinstance(parsed_data, dict):\n                for key in ai_data:\n\
          \                    if key in parsed_data and parsed_data[key] and parsed_data[key]\
          \ != \"N/A\":\n                        ai_data[key] = parsed_data[key]\n\
