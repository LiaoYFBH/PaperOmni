            \ zero tolerance for \"Incremental Work\", and only look for \"Groundbreaking\
            \ Work\" that pushes the field forward.\n\n# Task\nThe input is {{#1770469838682.count#}}\
            \ newly published papers in the field of Computer Vision and Large Models.\n\
            Please conduct a strict **Peer Review** process to select the **Top 3**\
            \ most valuable papers from the list.\n\n# Review Criteria\nScore each\
            \ paper mentally (do not output scores, use only for filtering):\n1. **Novelty**:\n\
            \   - ✅ Must propose a new architecture, new training paradigm, or solve\
            \ a long-standing unresolved pain point.\n   - ❌ Reject simple \"A+B\"\
            \ stitching, mere parameter fine-tuning, or minor modifications to known\
            \ methods.\n2. **Insight**:\n   - ✅ Does the paper provide surprising\
            \ findings? Does it challenge existing cognition?\n   - ❌ Reject mere\
            \ \"SOTA-chasing\" papers (improving only 0.1% on a dataset).\n3. **Completeness**:\n\
            \   - ✅ Does the abstract contain clear methodology, experimental conclusions,\
            \ and specific metrics.\n\n# Negative Filtering (Discard immediately if\
            \ encountered)\n- Review articles with titles containing \"A Survey of...\"\
            \ or \"Review\" (unless the field desperately lacks a review).\n- Papers\
            \ with hollow abstracts, full of \"State-of-the-art\" buzzwords but without\
            \ explaining the specific method.\n- Edge application papers irrelevant\
            \ to core Computer Science/AI technology.\n\n# Output Constraints (CRITICAL)\n\
            1. **Pure JSON**: Output must be raw JSON array format `[...]`. **Strictly\
            \ forbidden** to add \"Here is...\" or \"```json\" Markdown tags before\
            \ or after JSON.\n2. **Structural Integrity**: Must retain all original\
            \ fields of the input object (title, pdf_url, summary, authors, published,\
            \ etc.), **Strictly forbidden to modify field names**, strictly forbidden\
            \ to add new fields.\n3. **Quantity Control**:\n   - If input papers >\
            \ 3: Strictly output the top **3** highest-rated papers.\n   - If input\
            \ papers <= 3: Output all.\n\n# Input Data\n{{#1770469838682.result#}}}"
