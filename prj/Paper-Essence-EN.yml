    - data:
        code: "import json\nfrom datetime import datetime, timedelta\nimport re\n\n\
          def main(topic: str, days_lookback: int, count: int, supabase_output: list\
          \ = None) -> dict:\n    \"\"\"\n    Preprocessing step that receives keywords\
          \ already translated into English\n    and constructs an ArXiv-compatible\
          \ query.\n    \"\"\"\n    # Handle basic date-related parameters\n    today\
          \ = datetime.now()\n    days = int(days_lookback) if days_lookback else\
          \ 3  # Fallback window if not provided\n    cutoff_date = today - timedelta(days=days)\n\
          \    \n    cutoff_str = cutoff_date.strftime('%Y-%m-%d')\n    today_str\
          \ = today.strftime('%Y-%m-%d')\n    \n    # Parse previously pushed ArXiv\
          \ IDs with defensive handling\n    pushed_ids = []\n    if supabase_output\
          \ and isinstance(supabase_output, list):\n        try:\n            # Recursively\
          \ traverse nested structures to extract arxiv_id fields\n            def\
          \ extract_ids(obj):\n                ids = []\n                if isinstance(obj,\
          \ dict):\n                    if \"arxiv_id\" in obj:\n                \
          \        val = obj[\"arxiv_id\"]\n                        if val:\n    \
          \                        ids.append(str(val).strip('{} ').split('v')[0])\n\
          \                    for k, v in obj.items():\n                        ids.extend(extract_ids(v))\n\
          \                elif isinstance(obj, list):\n                    for item\
          \ in obj:\n                        ids.extend(extract_ids(item))\n     \
          \           return ids\n            \n            pushed_ids = list(set(extract_ids(supabase_output)))\n\
          \        except Exception:\n            pushed_ids = []\n\n    # Build a\
          \ robust ArXiv search query from free-form keywords\n    def build_robust_query(search_terms):\n\
          \        # Normalize whitespace in the input string\n        clean_topic\
          \ = re.sub(r'\\s+', ' ', search_terms.strip())\n        \n        if any(x\
          \ in clean_topic for x in [' AND ', ' OR ', 'cat:', 'ti:', 'abs:']):\n \
          \           return clean_topic\n\n        # Split into keywords and drop\
          \ overly short tokens\n        keywords = [w for w in clean_topic.split()\
          \ if len(w) > 1]\n        \n        if not keywords:\n            return\
          \ \"cat:cs.AI\"  # Safe fallback query\n\n        # Construct a conjunctive\
          \ query over title and abstract fields\n        query_parts = []\n     \
          \   for kw in keywords:\n            part = f'(ti:{kw} OR abs:{kw})'\n \
          \           query_parts.append(part)\n        \n        return ' AND '.join(query_parts)\n\
          \n    base_query = build_robust_query(topic)\n\n    # Automatically append\
          \ category constraints when none are explicitly provided\n    if 'cat:'\
          \ not in base_query:\n        topic_lower = topic.lower()\n        cat_map\
          \ = {\n            'cs.CV': ['vision', 'image', 'detection', 'segmentation',\
          \ 'video'],\n            'cs.CL': ['nlp', 'language', 'text', 'transformer',\
          \ 'bert', 'gpt', 'llm', 'prompt'],\n            'cs.RO': ['robot', 'manipulation',\
          \ 'nav'],\n            'cs.CR': ['security', 'crypto', 'attack', 'defense'],\n\
          \            'cs.LG': ['machine learning', 'deep learning', 'reinforcement',\
          \ 'neural'],\n            'cs.SE': ['software', 'code', 'debugging']\n \
          \       }\n        \n        added_cats = []\n        for cat, triggers\
          \ in cat_map.items():\n            if any(t in topic_lower for t in triggers):\n\
          \                added_cats.append(f'cat:{cat}')\n        \n        # Constrain\
          \ the query if matching categories are found\n        if added_cats:\n \
          \           cat_query = ' OR '.join(added_cats)\n            base_query\
          \ = f'({base_query}) AND ({cat_query})'\n\n    # Determine an expanded fetch\
          \ size to compensate for API pagination noise\n    fetch_limit = max(int(count)\
          \ * 5, 100)\n\n    # Generate a lowercase keyword list for downstream post-processing\n\
          \    search_keywords_list = [kw.lower() for kw in topic.split() if len(kw)\
          \ > 2]\n\n    return {\n        \"base_query\": base_query,\n        \"\
          pushed_ids\": pushed_ids,\n        \"cutoff_str\": cutoff_str,\n       \
          \ \"today_str\": today_str,\n        \"fetch_limit\": fetch_limit,\n   \
          \     \"count\": int(count),\n        \"search_keywords\": search_keywords_list\n\
          \    }\n"
        code_language: python3
        outputs:
          base_query:
