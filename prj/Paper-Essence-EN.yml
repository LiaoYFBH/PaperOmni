    - data:
        code: "import json\nimport re\n\ndef main(llm_string) -> dict:\n    selected_papers\
          \ = []\n\n    def try_parse(content):\n        \"\"\"Try to parse arbitrary\
          \ content into Python object\"\"\"\n        if isinstance(content, dict)\
          \ or isinstance(content, list):\n            return content\n        try:\n\
          \            # Try direct parsing\n            return json.loads(content)\n\
          \        except:\n            # Try regex extraction of JSON\n         \
          \   match = re.search(r'(\\{.*\\}|\\[.*\\])', str(content), re.DOTALL)\n\
          \            if match:\n                try:\n                    return\
          \ json.loads(match.group())\n                except:\n                 \
          \   pass\n        return None\n\n    try:\n        # First layer parsing\n\
          \        data = try_parse(llm_string)\n\n        # Handle nesting\n    \
          \    if isinstance(data, dict) and 'text' in data:\n            inner_data\
          \ = try_parse(data['text'])\n            if inner_data: \n             \
          \   data = inner_data\n        \n        # Normalization\n        if isinstance(data,\
          \ list):\n            selected_papers = data\n        elif isinstance(data,\
          \ dict):\n            # Prioritize finding papers field\n            if\
          \ 'papers' in data and isinstance(data['papers'], list):\n             \
          \   selected_papers = data['papers']\n            elif 'top_papers' in data\
          \ and isinstance(data['top_papers'], list):\n                selected_papers\
          \ = data['top_papers']\n            else:\n                for v in data.values():\n\
          \                    if isinstance(v, list):\n                        selected_papers\
          \ = v\n                        break\n        \n        if not isinstance(selected_papers,\
          \ list):\n            selected_papers = []\n\n    except Exception as e:\n\
          \        print(f\"Parsing failed severely: {str(e)}\")\n        selected_papers\
          \ = []\n\n    return {\n        \"top_papers\": selected_papers,\n     \
          \   \"count\": len(selected_papers)\n    }"
        code_language: python3
        outputs:
          count:
            children: null
            type: number
          top_papers:
            children: null
            type: array[object]
        selected: false
        title: JSON Parse
        type: code
        variables:
        - value_selector:
          - '1769350813065'
          - text
          value_type: string
          variable: llm_string
