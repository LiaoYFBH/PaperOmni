    - data:
        code: "def main(ocr_text: str, max_tokens: int = 121856) -> dict:\n    \"\"\
          \"\n    Truncate OCR text to avoid exceeding the token limit of the LLM.\n\
          \n    Parameters:\n    - ocr_text: Raw OCR text input\n    - max_tokens:\
          \ Maximum allowed token count (default 121856)\n\n    Returns:\n    - truncated_text:\
          \ The resulting truncated text\n    - original_length: Length of the original\
          \ text\n    - truncated_length: Length of the truncated text\n    - is_truncated:\
          \ Whether truncation was applied\n    \"\"\"\n    \n    if not ocr_text:\n\
          \        return {\n            \"truncated_text\": \"\",\n            \"\
          original_length\": 0,\n            \"truncated_length\": 0,\n          \
          \  \"is_truncated\": False\n        }\n    \n    original_length = len(ocr_text)\n\
          \    \n    # Rough estimation: 1 token ≈ 0.75 Chinese characters or ≈ 4\
          \ English characters\n    # For safety, assume 1 token equals 1 character\n\
          \    # With a 121856 token limit, use the same value as a character cap\n\
          \    max_chars = max_tokens\n    \n    if original_length <= max_chars:\n\
          \        # No truncation required\n        return {\n            \"truncated_text\"\
          : ocr_text,\n            \"original_length\": original_length,\n       \
          \     \"truncated_length\": original_length,\n            \"is_truncated\"\
          : False\n        }\n    \n    # Truncation is required\n    # Prefer preserving\
          \ the beginning of the text, which typically contains\n    # abstracts and\
          \ introductions, while also keeping a portion of the ending\n    \n    #\
          \ Strategy: keep the first 80% and the last 20%\n    front_chars = int(max_chars\
          \ * 0.8)\n    back_chars = int(max_chars * 0.2)\n    \n    truncated_text\
          \ = (\n        ocr_text[:front_chars] +\n        \"\\n\\n[... middle content\
          \ omitted ...]\\n\\n\" +\n        ocr_text[-back_chars:]\n    )\n    \n\
          \    return {\n        \"truncated_text\": truncated_text,\n        \"original_length\"\
          : original_length,\n        \"truncated_length\": len(truncated_text),\n\
          \        \"is_truncated\": True\n    }\n"
        code_language: python3
        isInIteration: true
        isInLoop: false
        iteration_id: '1768746557884'
