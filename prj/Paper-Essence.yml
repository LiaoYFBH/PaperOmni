    - data:
        selected: false
        template: "\U0001F4C5 PaperEssence 科研日报\r\n根据您指定的研究内容“{{ raw_topic }}”，每天推送arxiv近7日天更新论文中挑选的3篇论文。\r\
          \n--------------------------------------------------\r\n<small><i>⚠️ 注：内容由\
          \ AI 生成，仅供学术参考。请在引用或深入研究前，务必点击 PDF 链接查阅原始论文进行核实。</i></small>\r\n生成日期: {{\
          \ items.target_date | default('Today') }}\r\n==================================================\r\
          \n\r\n{# 自动适配数据结构 #}\r\n{% set final_list = items.paper | default(items)\
          \ %}\r\n\r\n{% for item in final_list %}\r\n\U0001F4C4 [{{ loop.index }}]\
          \ {{ item.title }}\r\n--------------------------------------------------\r\
          \n\U0001F464 作者: {{ item.authors }}\r\n\U0001F3E2 机构: {{ item.affiliation\
          \ }}\r\n\U0001F517 PDF: {{ item.pdf_url }}\r\n\U0001F4C5 状态: {{ item.published\
          \ }}\r\n{% if item.code_url and item.code_url != 'N/A' %}\r\n\U0001F4E6\
          \ Code: {{ item.github_stats }}\r\n   \U0001F517 {{ item.code_url }}\r\n\
          {% else %}\r\n\U0001F4E6 Code: {{ item.github_stats }}\r\n{% endif %}\r\n\
          English Abstract:\r\n{{ item.summary | replace('\\n', ' ') }}\r\n\r\n中文摘要:\r\
          \n{{ item.ai_evaluation.Chinese_Abstract }}\r\n\r\n\U0001F680 核心创新:\r\n\
          {{ item.ai_evaluation.One_Liner }}\r\n\r\n\U0001F4CA 总结:\r\n{# 利用换行和缩进制造层级感，不依赖\
          \ HTML 标签 #}\r\n--------------------------------------------------\r\n\U0001F3D7\
          ️ 架构:\r\n{{ item.ai_evaluation.Architecture | replace('\\n- ', '\\n\\n \
          \  \U0001F539 ') | replace('- ', '   \U0001F539 ') }}\r\n\r\n\U0001F4BE\
          \ 数据:\r\n{{ item.ai_evaluation.Dataset | replace('\\n- ', '\\n\\n   \U0001F539\
          \ ') | replace('- ', '   \U0001F539 ') }}\r\n\r\n\U0001F4C8 指标:\r\n{{ item.ai_evaluation.Metrics\
          \ | replace('\\n- ', '\\n\\n   \U0001F539 ') | replace('- ', '   \U0001F539\
          \ ') }}\r\n\r\n==================================================\r\n{%\
          \ else %}\r\n⚠️ 今日无新论文更新。\r\n{% endfor %}"
