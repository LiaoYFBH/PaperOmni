    - data:
        code: "import json\nimport re\n\ndef main(title: str, url: str, summary: str,\
          \ llm_string: str, pub_date: str, comment: str, authors: str) -> dict:\n\
          \    pub_status = \"Preprint\"\n    comment = comment if comment else \"\
          N/A\"\n    \n    if comment != \"N/A\":\n        # 常见顶会关键词库\n        conf_keywords\
          \ = ['cvpr', 'iccv', 'eccv', 'nips', 'neurips', 'iclr', 'aaai', 'ijcai',\
          \ 'acl', 'emnlp', 'naacl', 'siggraph', 'kdd', 'icml']\n        lower_comment\
          \ = comment.lower()\n        \n        for kw in conf_keywords:\n      \
          \      if kw in lower_comment:\n                display_comment = comment[:25]\
          \ + \"...\" if len(comment) > 25 else comment\n                pub_status\
          \ = f\"\U0001F389 {kw.upper()} ({display_comment})\"\n                break\n\
          \        else:\n            if 'conf' in lower_comment or 'proc' in lower_comment:\n\
          \                pub_status = \"\U0001F4C5 Conference/Journal\"\n      \
          \      elif 'workshop' in lower_comment:\n                pub_status = \"\
          \U0001F6E0️ Workshop\"\n    \n    try:\n        clean_date = pub_date[:10]\n\
          \    except:\n        clean_date = \"Recent\"\n\n    full_status_line =\
          \ f\"{clean_date} | {pub_status}\"\n\n    # 默认兜底值\n    ai_data = {\n   \
          \     \"One_Liner\": \"AI 正在阅读...\",\n        \"Architecture\": \"综合架构\"\
          ,\n        \"Dataset\": \"相关数据\",\n        \"Metrics\": \"核心指标\",\n    \
          \    \"Chinese_Abstract\": \"摘要生成中...\",\n        \"Affiliation\": \"提取中...\"\
          ,\n        \"Code_Url\": \"N/A\"\n    }\n\n    try:\n        if llm_string:\n\
          \            # 强制移除 <think>...</think> 标签及其内部所有内容\n            # flags=re.DOTALL\
          \ 确保 . 能匹配换行符\n            clean_content = re.sub(r'<think>.*?</think>',\
          \ '', llm_string, flags=re.DOTALL).strip()\n            \n            #\
          \ 处理 Markdown 代码块 (```json ... ```)\n            # 优先尝试匹配被代码块包裹的内容\n   \
          \         code_block_match = re.search(r'```json\\s*(\\{.*?\\})\\s*```',\
          \ clean_content, re.DOTALL)\n            if code_block_match:\n        \
          \        clean_json = code_block_match.group(1)\n            else:\n   \
          \             # 如果没有代码块，再尝试寻找最外层的 {}\n                # 此时 <think> 已被移除，找到第一个\
          \ { 通常就是 JSON 的开始\n                clean_json = clean_content.replace(\"\
          ```json\", \"\").replace(\"```\", \"\").strip()\n                match =\
          \ re.search(r'\\{.*\\}', clean_json, re.DOTALL)\n                if match:\n\
          \                    clean_json = match.group()\n            \n        \
          \    # 解析 JSON\n            parsed_data = json.loads(clean_json)\n     \
          \       \n            if isinstance(parsed_data, dict):\n              \
          \  ai_data.update(parsed_data)  \n    except:\n        pass\n    extracted_code\
          \ = ai_data.get(\"Code_Url\", \"N/A\")\n    display_code = \"N/A\"\n   \
          \ final_code_url = \"N/A\"\n    \n    invalid_keywords = [\"n/a\", \"none\"\
          , \"null\", \"未找到\", \"unknown\", \"coming soon\", \"no code\"]\n    \n\
          \    if extracted_code and extracted_code.lower() not in invalid_keywords:\n\
          \        clean_url = extracted_code.strip(\".,()[]'\\\"`。，\")\n        if\
          \ clean_url.startswith(\"http\"):\n            display_code = \"✅ Code Available\"\
          \n            final_code_url = clean_url\n\n    paper = {\n        \"title\"\
          : title or \"No Title\",\n        \"authors\": authors if authors else \"\
          Unknown Authors\",\n        \"affiliation\": ai_data.get('Affiliation',\
          \ 'N/A'),\n        \"pdf_url\": url,\n        \"summary\": summary,\n  \
          \      \"published\": full_status_line,\n        \"github_stats\": display_code,\
          \ \n        \"code_url\": final_code_url, \n        \"ai_evaluation\": ai_data\n\
          \    }\n    \n    return {\n        \"merged_paper\": paper\n    }"
