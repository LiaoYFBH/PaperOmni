    - data:
        code: "import json\nimport re\n\ndef main(llm_string) -> dict:\n    selected_papers\
          \ = []\n\n    def try_parse(content):\n        \"\"\"尝试将任意内容解析为 Python 对象\"\
          \"\"\n        if isinstance(content, dict) or isinstance(content, list):\n\
          \            return content\n        try:\n            # 尝试直接解析\n      \
          \      return json.loads(content)\n        except:\n            # 尝试正则提取\
          \ JSON\n            match = re.search(r'(\\{.*\\}|\\[.*\\])', str(content),\
          \ re.DOTALL)\n            if match:\n                try:\n            \
          \        return json.loads(match.group())\n                except:\n   \
          \                 pass\n        return None\n\n    try:\n        # 第一层解析\n\
          \        data = try_parse(llm_string)\n\n        # 处理嵌套\n        if isinstance(data,\
          \ dict) and 'text' in data:\n            inner_data = try_parse(data['text'])\n\
          \            if inner_data: \n                data = inner_data\n      \
          \  \n        # 归一化\n        if isinstance(data, list):\n            selected_papers\
          \ = data\n        elif isinstance(data, dict):\n            # 优先找 papers\
          \ 字段\n            if 'papers' in data and isinstance(data['papers'], list):\n\
          \                selected_papers = data['papers']\n            elif 'top_papers'\
          \ in data and isinstance(data['top_papers'], list):\n                selected_papers\
          \ = data['top_papers']\n            else:\n                for v in data.values():\n\
          \                    if isinstance(v, list):\n                        selected_papers\
          \ = v\n                        break\n        \n        if not isinstance(selected_papers,\
          \ list):\n            selected_papers = []\n\n    except Exception as e:\n\
          \        print(f\"解析严重失败: {str(e)}\")\n        selected_papers = []\n\n\
          \    return {\n        \"top_papers\": selected_papers,\n        \"count\"\
          : len(selected_papers)\n    }"
