          \ HF论文优先用 githubRepo，ArXiv 论文用 LLM 提取的 code_url\n    github_source = hf_github_repo\
          \ if hf_github_repo else code_url\n\n    if github_source and github_source\
          \ not in ('N/A', ''):\n        if 'github.com' in github_source.lower():\n\
          \            match = re.search(r'github\\.com/([^/\\s?#]+/[^/\\s?#]+)',\
          \ github_source)\n            if match:\n                repo_path = match.group(1).rstrip('/').rstrip('.git').rstrip('/')\n\
          \                github_api_url = f'https://api.github.com/repos/{repo_path}'\n\
          \n    hf_papers_url = f'https://huggingface.co/papers/{arxiv_id}'\n\n  \
          \  return {\n        'github_api_url': github_api_url,\n        'hf_papers_url':\
          \ hf_papers_url,\n    }\n"
