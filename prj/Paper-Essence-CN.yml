    - data:
        code: "import json\nimport re\n\ndef main(title: str, url: str, summary: str,\
          \ llm_string: str, pub_date: str, comment: str, authors: str) -> dict:\n\
          \    pub_status = \"Preprint\"\n    comment = comment if comment else \"\
          N/A\"\n    \n    if comment != \"N/A\":\n        conf_keywords = ['cvpr',\
          \ 'iccv', 'eccv', 'nips', 'neurips', 'iclr', 'aaai', 'ijcai', 'acl', 'emnlp',\
          \ 'naacl', 'siggraph', 'kdd', 'icml']\n        lower_comment = comment.lower()\n\
