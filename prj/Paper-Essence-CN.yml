          def main(topic: str, days_lookback: int, count: int, supabase_output: list\
          \ = None) -> dict:\n    \"\"\"\n    预处理：接收已转换为英文的关键词，构建ArXiv查询\n    \"\"\
          \"\n    # 基础参数处理\n    today = datetime.now()\n    days = int(days_lookback)\
          \ if days_lookback else 3 # 默认多看几天\n    cutoff_date = today - timedelta(days=days)\n\
          \    \n    cutoff_str = cutoff_date.strftime('%Y-%m-%d')\n    today_str\
          \ = today.strftime('%Y-%m-%d')\n    \n    # 解析已推送ID \n    pushed_ids = []\n\
          \    if supabase_output and isinstance(supabase_output, list):\n       \
          \ try:\n            # 尝试递归查找或扁平化处理，防止结构变化导致崩溃\n            def extract_ids(obj):\n\
          \                ids = []\n                if isinstance(obj, dict):\n \
          \                   if \"arxiv_id\" in obj:\n                        val\
          \ = obj[\"arxiv_id\"]\n                        if val: ids.append(str(val).strip('{}\
          \ ').split('v')[0])\n                    for k, v in obj.items():\n    \
          \                    ids.extend(extract_ids(v))\n                elif isinstance(obj,\
          \ list):\n                    for item in obj:\n                       \
          \ ids.extend(extract_ids(item))\n                return ids\n          \
          \  \n            pushed_ids = list(set(extract_ids(supabase_output)))\n\
          \        except Exception:\n            pushed_ids = []\n\n    # 构建鲁棒的查询字符串\n\
          \    def build_robust_query(search_terms):\n        # 预清洗：移除多余空格，转小写\n \
          \       clean_topic = re.sub(r'\\s+', ' ', search_terms.strip())\n     \
          \   \n        # 如果 LLM 已经生成了带有布尔逻辑的字符串（如 AND/OR），直接使用\n        if any(x\
          \ in clean_topic for x in [' AND ', ' OR ', 'cat:', 'ti:', 'abs:']):\n \
          \           return clean_topic\n\n        # 提取关键词（排除极短词）\n        keywords\
          \ = [w for w in clean_topic.split() if len(w) > 1]\n        \n        if\
          \ not keywords:\n            return \"cat:cs.AI\" # 兜底\n\n        # 策略：构建\
          \ (ti:A OR abs:A) AND (ti:B OR abs:B)\n        # 只要标题或摘要里有这个词就算命中\n    \
          \    query_parts = []\n        for kw in keywords:\n            # 给关键词加引号以进行精确匹配，避免\
          \ partial match 干扰\n            part = f'(ti:{kw} OR abs:{kw})'\n      \
          \      query_parts.append(part)\n        \n        return ' AND '.join(query_parts)\n\
          \n    base_query = build_robust_query(topic)\n\n    # 自动追加分类限制\n    # 只有当查询中没有显式指定分类时才自动追加\n\
          \    if 'cat:' not in base_query:\n        topic_lower = topic.lower()\n\
          \        cat_map = {\n            'cs.CV': ['vision', 'image', 'detection',\
          \ 'segmentation', 'video'],\n            'cs.CL': ['nlp', 'language', 'text',\
          \ 'transformer', 'bert', 'gpt', 'llm', 'prompt'],\n            'cs.RO':\
          \ ['robot', 'manipulation', 'nav'],\n            'cs.CR': ['security', 'crypto',\
          \ 'attack', 'defense'],\n            'cs.LG': ['machine learning', 'deep\
          \ learning', 'reinforcement', 'neural'],\n            'cs.SE': ['software',\
          \ 'code', 'debugging']\n        }\n        \n        added_cats = []\n \
          \       for cat, triggers in cat_map.items():\n            if any(t in topic_lower\
          \ for t in triggers):\n                added_cats.append(f'cat:{cat}')\n\
          \        \n        # 如果匹配到分类，限制范围；如果没有，默认搜索整个 CS 领域或保持原样\n        if added_cats:\n\
          \            # 使用 OR 连接多个可能的分类，例如既可能是 CV 也可能是 LG\n            cat_query\
          \ = ' OR '.join(added_cats)\n            base_query = f'({base_query}) AND\
          \ ({cat_query})'\n\n    # 计算 Fetch Limit\n    # ArXiv API 分页如果不准确，多抓一点由后处理去过滤\n\
          \    fetch_limit = max(int(count) * 5, 100)\n\n    # 生成供后处理使用的关键词列表\n  \
          \  search_keywords_list = [kw.lower() for kw in topic.split() if len(kw)\
          \ > 2]\n\n    return {\n        \"base_query\": base_query,\n        \"\
          pushed_ids\": pushed_ids,\n        \"cutoff_str\": cutoff_str,\n       \
          \ \"today_str\": today_str,\n        \"fetch_limit\": fetch_limit,\n   \
          \     \"count\": int(count),\n        \"search_keywords\": search_keywords_list\n\
          \    }"
        code_language: python3
