    - data:
        code: "def main(doc_json):\n    if doc_json is None:\n        return {\"footnote_text\"\
          : \"\"}\n\n    data = doc_json\n    footnotes = []\n\n    def walk(obj):\n\
          \        if isinstance(obj, dict):\n            if obj.get(\"block_label\"\
          ) == \"footnote\":\n                content = (obj.get(\"block_content\"\
          ) or \"\").strip()\n                if content:\n                    footnotes.append(content)\n\
          \            for v in obj.values():\n                walk(v)\n        elif\
          \ isinstance(obj, list):\n            for v in obj:\n                walk(v)\n\
          \n    walk(data)\n\n    return {\"footnote_text\": \"\\n\".join(footnotes).strip()}\n"
