    - data:
        code: "import json\n\ndef main(merged_paper: dict, github_body: str,\n   \
          \            github_status: int, altmetric_body: str,\n               altmetric_status:\
          \ int) -> dict:\n    paper = dict(merged_paper) if merged_paper else {}\n\
          \    source = paper.get('source', 'arxiv')\n\n    # ── GitHub Stars ──\n\
          \    star_count = 0\n    github_stars_display = 'N/A'\n    hf_github_stars\
          \ = paper.get('hf_github_stars', 0) or 0\n\n    if source == 'hf' and hf_github_stars\
          \ > 0:\n        # HF papers: use pre-fetched star count directly\n     \
          \   star_count = hf_github_stars\n        github_stars_display = f'⭐ {star_count:,}\
          \ stars'\n        if star_count >= 100:\n            github_stars_display\
          \ += ' ✅'\n    else:\n        try:\n            if github_status == 200\
          \ and github_body:\n                gh_data = json.loads(github_body)\n\
          \                star_count = gh_data.get('stargazers_count', 0) or 0\n\
          \                if star_count > 0:\n                    github_stars_display\
          \ = f'⭐ {star_count:,} stars'\n                    if star_count >= 100:\n\
          \                        github_stars_display += ' ✅'\n        except Exception:\n\
          \            pass\n\n    # ── X.com 热度 ──\n    if source == 'hf':\n    \
          \    x_hot = True\n        upvotes = paper.get('upvotes', 0) or 0\n    \
          \    x_heat_display = f'⬆ {upvotes} upvotes（HuggingFace Papers 社区热度）'\n\
          \    else:\n        x_hot = (altmetric_status == 200)\n        x_heat_display\
          \ = '⬆ HuggingFace Papers 已收录' if x_hot else '—'\n\n    paper['github_star_count']\
          \    = star_count\n    paper['github_stars_display'] = github_stars_display\n\
          \    paper['x_hot']                = x_hot\n    paper['x_heat_display']\
          \       = x_heat_display\n    paper['hf_papers_url']        = f\"https://huggingface.co/papers/{paper.get('arxiv_id',\
          \ '')}\"\n\n    return {'enriched_paper': paper}\n"
        code_language: python3
        isInIteration: true
        isInLoop: false
