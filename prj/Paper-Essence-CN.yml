    - data:
        code: "import xml.etree.ElementTree as ET\nfrom datetime import datetime\n\
          import json\n\ndef main(\n    http_response_body: str,\n    base_query_var:\
          \ str,\n    pushed_ids_var: list,\n    cutoff_str_var: str,\n    today_str_var:\
          \ str,\n    fetch_limit_var: int,\n    count_var: int,\n    search_keywords_var:\
          \ list\n) -> dict:\n    \"\"\"\n    处理HTTP响应，解析XML并过滤结果\n    \"\"\"\n  \
          \  try:\n        root = ET.fromstring(http_response_body)\n        ns =\
          \ {'atom': 'http://www.w3.org/2005/Atom', 'arxiv': 'http://arxiv.org/schemas/atom'}\n\
          \        entries = root.findall('atom:entry', ns)\n        \n        filtered_results\
          \ = []\n        \n        # 变量解包\n        pushed_ids_str = set(str(item)\
          \ for item in pushed_ids_var) # 用集合查重更快\n        count = int(count_var)\n\
          \        cutoff_date = datetime.strptime(cutoff_str_var, \"%Y-%m-%d\") if\
          \ cutoff_str_var else datetime.now()\n        \n        debug_counters =\
          \ {\"duplicate\": 0, \"too_old\": 0, \"kept\": 0}\n\n        for entry in\
          \ entries:\n            # if len(filtered_results) >= count:\n         \
          \   #     break\n\n            # 提取 ID\n            id_url = entry.find('atom:id',\
          \ ns).text\n            raw_id = id_url.rsplit('/', 1)[-1] if id_url else\
          \ \"\"\n            arxiv_id = raw_id.split('v')[0].strip() # 移除 v1, v2\n\
          \            \n            # 过滤已推送\n            if arxiv_id in pushed_ids_str:\n\
          \                debug_counters[\"duplicate\"] += 1\n                continue\n\
          \            \n            # 过滤日期\n            published_str = entry.find('atom:published',\
          \ ns).text\n            try:\n                # 只取 YYYY-MM-DD\n        \
          \        pub_date_dt = datetime.strptime(published_str[:10], \"%Y-%m-%d\"\
          )\n                if pub_date_dt.date() < cutoff_date.date():\n       \
          \             debug_counters[\"too_old\"] += 1\n                    continue\n\
          \            except:\n                pass # 解析失败则放行，避免误杀\n\n          \
          \  # 提取信息\n            title = entry.find('atom:title', ns).text or \"\"\
          \n            title = title.replace('\\n', ' ').strip()\n            \n\
          \            summary = entry.find('atom:summary', ns).text or \"\"\n   \
          \         summary = summary.replace('\\n', ' ').strip()\n            \n\n\
          \            # 提取作者\n            authors = []\n            for author in\
          \ entry.findall('atom:author', ns):\n                name = author.find('atom:name',\
          \ ns).text\n                if name: authors.append(name)\n            authors_str\
          \ = \", \".join(authors[:3]) + (\" et al.\" if len(authors) > 3 else \"\"\
          )\n\n            # 提取 PDF\n            links = entry.findall('atom:link',\
          \ ns)\n            pdf_url = f\"https://arxiv.org/pdf/{arxiv_id}.pdf\" #\
          \ 默认构造\n            for link in links:\n                if link.attrib.get('title')\
          \ == 'pdf':\n                    pdf_url = link.attrib.get('href')\n\n \
          \           result_item = {\n                \"arxiv_id\": arxiv_id,\n \
          \               \"title\": title,\n                \"summary\": summary,\
          \ # 摘要可以后续由 LLM 总结\n                \"authors\": authors_str,\n        \
          \        \"published\": published_str[:10],\n                \"pdf_url\"\
          : pdf_url,\n                \"url\": id_url\n            }\n           \
          \ \n            filtered_results.append(result_item)\n            debug_counters[\"\
          kept\"] += 1\n\n        return {\n            \"result\": json.dumps(filtered_results,\
          \ ensure_ascii=False),\n            \"count\": len(filtered_results),\n\
          \            \"debug\": f\"Total fetched: {len(entries)}. Dup: {debug_counters['duplicate']},\
          \ Old: {debug_counters['too_old']}, Kept: {debug_counters['kept']}\"\n \
          \       }\n\n    except Exception as e:\n        return {\n            \"\
          result\": \"[]\", \n            \"count\": 0, \n            \"debug\": f\"\
          Error parsing XML: {str(e)}\"\n        }"
        code_language: python3
        outputs:
          count:
            children: null
            type: number
          debug:
            children: null
            type: string
          result:
            children: null
            type: string
