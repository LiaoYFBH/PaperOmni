    - data:
        code: "import json\nimport re\n\ndef main(title: str, url: str, summary: str,\n\
          \    llm_string: str, pub_date: str, comment: str, authors: str,\n    source:\
          \ str = \"arxiv\", upvotes: int = 0,\n    hf_github_stars: int = 0, hf_github_repo:\
          \ str = \"\") -> dict:\n    pub_status = \"Preprint\"\n    comment = comment\
          \ if comment else \"N/A\"\n    \n    if comment != \"N/A\":\n        conf_keywords\
          \ = ['cvpr', 'iccv', 'eccv', 'nips', 'neurips', 'iclr', 'aaai', 'ijcai',\
          \ 'acl', 'emnlp', 'naacl', 'siggraph', 'kdd', 'icml']\n        lower_comment\
          \ = comment.lower()\n        \n        for kw in conf_keywords:\n      \
          \      if kw in lower_comment:\n                display_comment = comment[:25]\
          \ + \"...\" if len(comment) > 25 else comment\n                pub_status\
          \ = f\"\U0001F389 {kw.upper()} ({display_comment})\"\n                break\n\
          \        else:\n            if 'conf' in lower_comment or 'proc' in lower_comment:\n\
          \                pub_status = \"\U0001F4C5 Conference/Journal\"\n      \
          \      elif 'workshop' in lower_comment:\n                pub_status = \"\
          \U0001F6E0️ Workshop\"\n    \n    try:\n        clean_date = pub_date[:10]\n\
          \    except:\n        clean_date = \"Recent\"\n\n    full_status_line =\
          \ f\"{clean_date} | {pub_status}\"\n\n    ai_data = {\n        \"One_Liner\"\
          : \"AI is reading...\",\n        \"Architecture\": \"Integrated architecture\"\
          ,\n        \"Dataset\": \"Relevant data\",\n        \"Metrics\": \"Core\
          \ metrics\",\n        \"Affiliation\": \"Extracting...\",\n        \"Code_Url\"\
          : \"N/A\",\n        \"Chinese_Abstract\": \"\" \n    }\n\n    try:\n   \
          \     if llm_string:\n            clean_content = llm_string.strip()\n \
          \           \n            code_block_match = re.search(\n              \
          \  r'```(?:json)?\\s*(\\{.*?\\})\\s*```',\n                clean_content,\n\
          \                re.DOTALL\n            )\n            if code_block_match:\n\
          \                clean_json = code_block_match.group(1)\n            else:\n\
          \                match = re.search(r'\\{.*\\}', clean_content, re.DOTALL)\n\
          \                clean_json = match.group() if match else clean_content\n\
          \            \n            clean_json = clean_json.strip()\n           \
          \ \n            try:\n                parsed_data = json.loads(clean_json,\
          \ strict=False)\n            except json.JSONDecodeError:\n            \
          \    clean_json = clean_json.replace(\"'\", '\"')\n                clean_json\
          \ = re.sub(r',\\s*}', '}', clean_json)\n                clean_json = re.sub(r',\\\
          s*]', ']', clean_json)\n                try:\n                    parsed_data\
          \ = json.loads(clean_json, strict=False)\n                except:\n    \
          \                parsed_data = None\n            \n            if parsed_data\
          \ and isinstance(parsed_data, dict):\n                for key in ai_data:\n\
          \                    if key in parsed_data and parsed_data[key] and parsed_data[key]\
          \ != \"N/A\":\n                        ai_data[key] = parsed_data[key]\n\
          \                    elif key.lower() in parsed_data and parsed_data[key.lower()]\
          \ and parsed_data[key.lower()] != \"N/A\":\n                        ai_data[key]\
          \ = parsed_data[key.lower()]\n    except:\n        pass\n    \n    extracted_code\
          \ = ai_data.get(\"Code_Url\", \"N/A\")\n    display_code = \"N/A\"\n   \
          \ final_code_url = \"N/A\"\n    \n    invalid_keywords = [\"n/a\", \"none\"\
          , \"null\", \"unknown\", \"coming soon\", \"no code\", \"\"]\n    \n   \
          \ if extracted_code and str(extracted_code).strip().lower() not in invalid_keywords:\n\
          \        clean_url = str(extracted_code).strip(\".,()[]'\\\"`。， \\t\\n\\\
          r\")\n        if clean_url.startswith((\"http://\", \"https://\")):\n  \
          \          display_code = \"✅ Code Available\"\n            final_code_url\
          \ = clean_url\n        elif \".\" in clean_url:\n            final_code_url\
          \ = f\"https://{clean_url.lstrip('www.')}\"\n            display_code =\
          \ \"✅ Code Available\"\n\n    # Fix 3: HF论文优先用 hf_github_repo 作为 code_url\n\
          \    if hf_github_repo and final_code_url == 'N/A':\n        final_code_url\
          \ = hf_github_repo\n        display_code = \"✅ Code Available\"\n\n    #\
          \ 提取 arxiv_id（从 url 里解析，作为兜底）\n    arxiv_id_extracted = ''\n    try:\n \
          \       import re as _re\n        m = _re.search(r'arxiv\\.org/(?:pdf|abs)/([\\\
          d.]+)', url or '')\n        if m:\n            arxiv_id_extracted = m.group(1)\n\
          \    except:\n        pass\n\n    paper = {\n        \"title\": title or\
          \ \"No Title\",\n        \"authors\": authors if authors else \"Unknown\
          \ Authors\",\n        \"affiliation\": ai_data.get(\"Affiliation\", \"N/A\"\
          ),\n        \"pdf_url\": url,\n        \"arxiv_id\": arxiv_id_extracted,\n\
          \        \"summary\": summary,\n        \"published\": full_status_line,\n\
          \        \"github_stats\": display_code,\n        \"code_url\": final_code_url,\n\
          \        \"source\": source or \"arxiv\",\n        \"upvotes\": upvotes\
          \ or 0,\n        \"hf_github_stars\": hf_github_stars or 0,\n        \"\
          hf_github_repo\": hf_github_repo or \"\",\n        \"ai_evaluation\": ai_data\n\
          \    }\n    \n    return {\n        \"merged_paper\": paper\n    }\n"
