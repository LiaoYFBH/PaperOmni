    - data:
        code: "def main(ocr_text: str, max_tokens: int = 100000) -> dict:\n    \"\"\
          \"\n    裁剪 OCR 文本以避免超过 LLM 的 token 限制\n    \n    参数:\n    - ocr_text: 原始\
          \ OCR 文本\n    - max_tokens: 最大 token 数（默认 100000，约等于 75000 个中文字符）\n    \n\
          \    返回:\n    - truncated_text: 裁剪后的文本\n    - original_length: 原始文本长度\n\
          \    - truncated_length: 裁剪后文本长度\n    - is_truncated: 是否进行了裁剪\n    \"\"\"\
          \n    \n    if not ocr_text:\n        return {\n            \"truncated_text\"\
          : \"\",\n            \"original_length\": 0,\n            \"truncated_length\"\
          : 0,\n            \"is_truncated\": False\n        }\n    \n    original_length\
          \ = len(ocr_text)\n    \n    # 粗略估算：1 token ≈ 0.75 个中文字符，≈ 4 个英文字符，设置为 100000\
          \ 字符（留出余量给其他输入）\n    max_chars = max_tokens\n    \n    if original_length\
          \ <= max_chars:\n        # 不需要裁剪\n        return {\n            \"truncated_text\"\
          : ocr_text,\n            \"original_length\": original_length,\n       \
          \     \"truncated_length\": original_length,\n            \"is_truncated\"\
          : False\n        }\n    \n\n    # 策略：保留前 80% 和后 20%\n    front_chars = int(max_chars\
          \ * 0.8)\n    back_chars = int(max_chars * 0.2)\n    \n    truncated_text\
          \ = (\n        ocr_text[:front_chars] + \n        \"\\n\\n[... 中间部分已省略 ...]\\\
          n\\n\" + \n        ocr_text[-back_chars:]\n    )\n    \n    return {\n \
          \       \"truncated_text\": truncated_text,\n        \"original_length\"\
          : original_length,\n        \"truncated_length\": len(truncated_text),\n\
          \        \"is_truncated\": True\n    }\n"
        code_language: python3
        isInIteration: true
        isInLoop: false
        iteration_id: '1768746557884'
        outputs:
          is_truncated:
            children: null
            type: boolean
          original_length:
            children: null
            type: number
          truncated_length:
            children: null
            type: number
          truncated_text:
            children: null
            type: string
        selected: false
        title: truncated_text
        type: code
        variables:
        - value_selector:
          - '1772791200305'
          - text
          value_type: string
          variable: ocr_text
