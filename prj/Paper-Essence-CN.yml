    - data:
        code: "import json\n\ndef main(hf_body: str, supabase_output: list = None)\
          \ -> dict:\n    pushed_ids = set()\n    if supabase_output and isinstance(supabase_output,\
          \ list):\n        def extract_ids(obj):\n            ids = []\n        \
          \    if isinstance(obj, dict):\n                if \"arxiv_id\" in obj:\n\
          \                    val = obj[\"arxiv_id\"]\n                    if val:\n\
          \                        ids.append(str(val).strip().split('v')[0])\n  \
          \              for k, v in obj.items():\n                    ids.extend(extract_ids(v))\n\
          \            elif isinstance(obj, list):\n                for item in obj:\n\
          \                    ids.extend(extract_ids(item))\n            return ids\n\
          \        pushed_ids = set(extract_ids(supabase_output))\n\n    try:\n  \
          \      raw = json.loads(hf_body) if hf_body else []\n        if not isinstance(raw,\
          \ list):\n            raw = []\n\n        papers = []\n        for item\
          \ in raw:\n            paper_info = item.get('paper', item)\n          \
          \  arxiv_id = paper_info.get('id', '')\n            if not arxiv_id:\n \
          \               continue\n            clean_id = arxiv_id.strip().split('v')[0]\n\
          \            if clean_id in pushed_ids:\n                continue\n\n  \
          \          authors_raw = paper_info.get('authors', [])\n            names\
          \ = [a.get('name', '') for a in authors_raw[:3] if isinstance(a, dict)]\n\
          \            authors_str = ', '.join(names)\n            if len(authors_raw)\
          \ > 3:\n                authors_str += ' et al.'\n\n            pub = paper_info.get('publishedAt',\
          \ '') or ''\n            papers.append({\n                'arxiv_id': clean_id,\n\
          \                'title': paper_info.get('title', 'No Title'),\n       \
          \         'summary': paper_info.get('summary', ''),\n                'authors':\
          \ authors_str,\n                'published': pub[:10] if pub else '',\n\
          \                'pdf_url': f\"https://arxiv.org/pdf/{clean_id}.pdf\",\n\
          \                'upvotes': paper_info.get('upvotes', 0) or 0,\n       \
          \         'githubRepo': paper_info.get('githubRepo', '') or '',\n      \
          \          'githubStars': paper_info.get('githubStars', 0) or 0,\n     \
          \           'source': 'hf',\n                'comment': 'N/A',\n       \
          \     })\n\n        papers.sort(key=lambda x: x.get('upvotes', 0), reverse=True)\n\
          \n        return {\n            'hf_papers_json': json.dumps(papers, ensure_ascii=False),\n\
          \            'hf_count': len(papers),\n        }\n    except Exception as\
          \ e:\n        return {'hf_papers_json': '[]', 'hf_count': 0}\n"
        code_language: python3
