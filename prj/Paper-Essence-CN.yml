          \ PDF: {{ item.pdf_url }}\n\U0001F4C5 状态: {{ item.published }}\n{% if item.code_url\
          \ and item.code_url != 'N/A' %}\n\U0001F4E6 Code: {{ item.github_stats }}\n\
          \   \U0001F517 {{ item.code_url }}\n{% else %}\n\U0001F4E6 Code: {{ item.github_stats\
          \ }}\n{% endif %}\n\n⭐ GitHub Stars: {{ item.github_stars_display | default('N/A')\
          \ }}{% if item.github_star_count and item.github_star_count >= 100 %}  ←\
          \ 已超过 100 Stars{% endif %}\n\n\U0001F680 社区热度: {{ item.x_heat_display |\
          \ default('—') }}\n{% if item.x_hot %}\n   \U0001F4CE HuggingFace收录页: {{\
          \ item.hf_papers_url }}\n{% endif %}\n\n\U0001F4CA 中文摘要:\n{{ item.ai_evaluation.Chinese_Abstract\
