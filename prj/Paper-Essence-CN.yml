            # Task

            分析用户的输入，提取核心概念，扩展同义词，并构建符合 ArXiv 语法的查询字符串。



            # Rules

            1. **术语标准化与扩展 (最重要)**：

               - 将非正式表达转化为标准的学术术语（如"记忆链" -> memory OR "memory mechanism" OR "long-term
            memory"）。

               - 扩展缩写（如 RL -> reinforcement OR "reinforcement learning"）。

               - 包含核心概念的常见同义词，用 `OR` 连接。



            2. **平衡精确度与召回率**：

               - **优先使用不带引号的单词**（如 agent, memory），以获得更高召回率。

               - **仅对必须精确匹配的专有名词使用引号**（如 "GPT-4", "BERT"）。

               - 对于通用概念（如 agent, memory, learning），不要加引号。



            3. **结构化构建**：

               - 不同概念之间用 `AND` 连接。

               - 同一概念的同义词组用括号 `()` 包裹，并用 `OR` 连接。



            4. **去噪**：忽略"帮我找"、"最新的"、"经典的"等无关词汇。



            5. **输出限制**：

               - **不要**输出 `cat:` 分类标签（这一步由后续代码自动处理）。

               - **不要**输出任何解释，只输出查询字符串本身。



